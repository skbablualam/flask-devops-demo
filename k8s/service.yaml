apiVersion: v1
kind: Service
metadata:
  name: flask-devops-demo
  namespace: default
  labels:
    app: flask-devops-demo
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: flask-devops-demo
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flask-devops-demo-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: flask-devops-demo
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: default
    ports:
    - protocol: TCP
      port: 5000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53