# SonarQube Configuration for Flask DevOps Demo
sonar.organization=flask-devops-demo
sonar.projectKey=flask-devops-demo
sonar.projectName=Flask DevOps Demo Application
sonar.projectVersion=1.0.0
sonar.description=DevOps demonstration project with Flask, Kubernetes, and CI/CD pipeline

# Source Directories
sonar.sources=.
sonar.sourceEncoding=UTF-8
sonar.exclusions=venv/**,**/*.pyc,**/.*,build/**,dist/**,.venv/**,**/node_modules/**,helm/**

# Python Settings
sonar.python.version=3.12
sonar.python.file.suffixes=.py

# Tests Configuration
sonar.tests=.
sonar.test.inclusions=**/*test*.py,**/tests.py
sonar.test.exclusions=venv/**

# Coverage Settings (if using coverage reports)
sonar.python.coverage.reportPaths=coverage.xml

# Code Metrics
sonar.metrics.exportMatrixFile=true
sonar.analysis.mode=publish

# Issue Filters
sonar.issues.exclude=

# SCM Blame
sonar.scm.disabled=false
sonar.scm.provider=git

# Branch Configuration
sonar.branch.name=main

# Performance & Quality Gate
sonar.qualitygate.wait=false
sonar.qualitygate.timeout=300